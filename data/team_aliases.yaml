# Mapeo de nombres de equipo entre las fuentes de datos.
#   id            -> slug interno estable (no cambia nunca)
#   name          -> nombre para mostrar
#   clubelo_name  -> nombre exacto en clubelo.com (http://api.clubelo.com/<name>)
#   understat_name-> nombre del equipo en understat.com
#   fbref_name    -> nombre del equipo en fbref.com
#
# OJO: los `clubelo_name` de abajo son la mejor aproximación; deben verificarse
# en la Fase 7 contactando con la API real de clubelo (algunos usan grafías
# distintas, p.ej. "Bilbao" para el Athletic). El proceso de carga falla con un
# error claro si un nombre de una fuente no aparece aquí.
