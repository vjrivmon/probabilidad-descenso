# Mapeo de nombres de equipo entre las fuentes de datos.
#   id              -> slug interno estable (no cambia nunca)
#   name            -> nombre para mostrar
#   clubelo_name    -> nombre exacto en clubelo.com (http://api.clubelo.com/<name>)
#   understat_name  -> nombre del equipo en understat.com
#   fbref_name      -> nombre del equipo en fbref.com
#   openfootball_name -> nombre del equipo en openfootball/football.json (es.1.json)
#
# El proceso de carga falla con un error claro si un nombre de una fuente no
# aparece aquí (ver adapters/data/team_aliases.resolve_from_source).
#
# Plantel de LaLiga 2025-26 (20 equipos). clubelo_name y openfootball_name están
# verificados contra las respuestas reales de cada fuente (2026-05-10).

